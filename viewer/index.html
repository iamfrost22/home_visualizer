<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Floorplan → 3D</title>
<style>
  :root {
    --bg: #0f1117;
    --panel-bg: rgba(18, 20, 28, 0.92);
    --panel-border: rgba(255,255,255,0.07);
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.3);
    --ink: #f0f0f5;
    --ink-muted: rgba(240,240,245,0.45);
    --ink-dim: rgba(240,240,245,0.22);
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  canvas#scene { display: block; position: fixed; inset: 0; }

  /* ── AR overlay ───────────────────────────────────────────────────── */
  #ar-video {
    display: none;
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  #ar-video.active { display: block; }
  canvas#scene.ar-mode { background: transparent !important; }
  #ar-hud {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%; transform: translateX(-50%);
    z-index: 30;
    background: rgba(14,16,22,0.82);
    backdrop-filter: blur(12px);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 12px 20px;
    display: flex; gap: 16px; align-items: center;
    font-size: 12px; color: var(--ink-muted);
  }
  #ar-hud.active { display: flex; }
  #ar-hud label { display: flex; flex-direction: column; gap: 4px; align-items: center; font-size: 10px; color: var(--ink-dim); }
  #ar-hud input[type=range] { width: 80px; accent-color: var(--accent); }
  #ar-stop-btn {
    padding: 6px 14px;
    background: rgba(239,68,68,0.18);
    border: 1px solid rgba(239,68,68,0.35);
    border-radius: 8px;
    color: #f87171;
    font-size: 11px; font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #ar-stop-btn:hover { background: rgba(239,68,68,0.32); }
  .ar-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 6px; padding: 2px 8px;
    font-size: 10px; font-weight: 700; color: #f87171;
    letter-spacing: 0.06em;
  }
  .ar-badge::before { content: ''; width: 6px; height: 6px; background: #f87171; border-radius: 50%; animation: ar-pulse 1.2s infinite; }
  @keyframes ar-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Vertical sidebar ─────────────────────────────────────────────── */
  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 20;
    width: 56px;
    background: var(--panel-bg);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-right: 1px solid var(--panel-border);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 0;
    gap: 4px;
    transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Logo mark ────────────────────────────────────────────────────── */
  .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
    flex-shrink: 0;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .logo svg { color: #fff; }

  /* ── Nav icons ────────────────────────────────────────────────────── */
  .nav-item {
    position: relative;
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--ink-muted);
    transition: background 0.15s, color 0.15s;
    border: none;
    background: none;
    flex-shrink: 0;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: var(--ink); }
  .nav-item.active { background: rgba(99,102,241,0.18); color: var(--accent); }
  .nav-item svg { pointer-events: none; }

  /* Active dot */
  .nav-item.active::after {
    content: '';
    position: absolute;
    right: 4px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 16px;
    background: var(--accent);
    border-radius: 2px;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .nav-divider {
    width: 28px; height: 1px;
    background: var(--panel-border);
    margin: 4px 0;
    flex-shrink: 0;
  }

  /* ── Flyout panel ─────────────────────────────────────────────────── */
  #flyout {
    position: fixed;
    top: 0; bottom: 0;
    left: 56px;
    width: 280px;
    background: rgba(14, 16, 22, 0.96);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--panel-border);
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 19;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #flyout.open { transform: translateX(0); }

  .flyout-header {
    padding: 18px 18px 12px;
    border-bottom: 1px solid var(--panel-border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .flyout-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .flyout-close {
    width: 24px; height: 24px;
    border: none; background: none;
    cursor: pointer;
    color: var(--ink-muted);
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    transition: background 0.12s, color 0.12s;
  }
  .flyout-close:hover { background: rgba(255,255,255,0.07); color: var(--ink); }

  .flyout-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .flyout-body::-webkit-scrollbar { width: 4px; }
  .flyout-body::-webkit-scrollbar-track { background: transparent; }
  .flyout-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* ── Section label ────────────────────────────────────────────────── */
  .label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .label::after { content: ''; flex: 1; height: 1px; background: var(--panel-border); }

  /* ── Buttons ──────────────────────────────────────────────────────── */
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .btn-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
  .btn {
    padding: 8px 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-sm);
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;
    text-align: center;
    line-height: 1.2;
  }
  .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
  .btn.selected {
    background: rgba(99,102,241,0.25);
    border-color: var(--accent);
    color: #a5b4fc;
    box-shadow: 0 0 12px rgba(99,102,241,0.2);
  }
  .btn-full {
    width: 100%;
    padding: 9px 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-sm);
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.12s;
    text-align: left;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px;
  }
  .btn-full:hover { background: rgba(255,255,255,0.09); }
  .btn-full.selected {
    background: rgba(99,102,241,0.2);
    border-color: var(--accent);
    color: #a5b4fc;
  }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .btn-accent:hover { background: #4f52d8; }

  /* ── Texture swatches ─────────────────────────────────────────────── */
  .texture-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .tex-swatch {
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    border: 2px solid transparent;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: border-color 0.15s, transform 0.1s;
  }
  .tex-swatch:hover { transform: scale(1.05); }
  .tex-swatch.selected { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
  .tex-swatch canvas { width: 100%; height: 100%; display: block; }
  .tex-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.65);
    font-size: 9px;
    color: rgba(255,255,255,0.85);
    text-align: center;
    padding: 2px 0;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  /* ── Color rows ───────────────────────────────────────────────────── */
  .color-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.12s;
  }
  .color-row:hover { background: rgba(255,255,255,0.04); }
  .color-row-label { flex: 1; font-size: 12px; color: var(--ink); }
  .swatch-wrap {
    width: 24px; height: 24px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,0.15);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .swatch-wrap input[type="color"] {
    position: absolute; inset: -4px;
    width: calc(100% + 8px); height: calc(100% + 8px);
    border: none; padding: 0; cursor: pointer; opacity: 0;
  }
  .swatch-bg { position: absolute; inset: 0; pointer-events: none; }
  .hex-val { font-size: 10px; color: var(--ink-dim); font-variant-numeric: tabular-nums; min-width: 48px; text-align: right; }

  /* ── Palette strip ────────────────────────────────────────────────── */
  .palette-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .palette-name { font-size: 11px; color: var(--ink-muted); width: 70px; flex-shrink: 0; }
  .palette-dots { display: flex; gap: 4px; }
  .pal-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.12);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .pal-dot[data-palette]:hover {
    transform: scale(1.25);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  /* ── Door / Window type cards ─────────────────────────────────────── */
  .type-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 4px 5px;
    gap: 4px;
  }
  .type-card:hover { background: rgba(255,255,255,0.08); }
  .type-card.selected {
    background: rgba(99,102,241,0.2);
    border-color: var(--accent);
  }
  .type-card svg { color: var(--ink-muted); }
  .type-card.selected svg { color: #a5b4fc; }
  .type-card-name {
    font-size: 9.5px;
    font-weight: 600;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
    text-align: center;
  }
  .type-card.selected .type-card-name { color: #a5b4fc; }

  /* ── Toggle switch ────────────────────────────────────────────────── */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0;
  }
  .toggle-label { font-size: 12px; color: var(--ink); }
  .toggle {
    position: relative; width: 34px; height: 18px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s;
    pointer-events: none;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

  /* ── Status bar ───────────────────────────────────────────────────── */
  #statusbar {
    position: fixed;
    bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(14,16,22,0.88);
    backdrop-filter: blur(12px);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    padding: 7px 18px;
    font-size: 11.5px;
    color: var(--ink-muted);
    z-index: 30;
    pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap;
  }

  /* ── Tooltip ──────────────────────────────────────────────────────── */
  .nav-tooltip {
    position: absolute;
    left: calc(100% + 10px);
    top: 50%; transform: translateY(-50%);
    background: rgba(14,16,22,0.95);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    color: var(--ink);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
  }
  .nav-item:hover .nav-tooltip { opacity: 1; }

  /* ── Divider ──────────────────────────────────────────────────────── */
  .divider { height: 1px; background: var(--panel-border); margin: 2px 0; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- ─── Sidebar ─────────────────────────────────────────────────────────── -->
<div id="sidebar">
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <path d="M2 14V6l7-4 7 4v8l-7 4-7-4Z" stroke="currentColor" stroke-width="1.4" fill="none"/>
      <path d="M2 6l7 4 7-4M9 10v8" stroke="currentColor" stroke-width="1.4"/>
    </svg>
  </div>

  <button class="nav-item active" data-panel="samples" title="">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" fill="currentColor" opacity=".8"/><rect x="10" y="2" width="6" height="6" rx="1.5" fill="currentColor" opacity=".8"/><rect x="2" y="10" width="6" height="6" rx="1.5" fill="currentColor" opacity=".8"/><rect x="10" y="10" width="6" height="6" rx="1.5" fill="currentColor" opacity=".8"/></svg>
    <span class="nav-tooltip">Samples</span>
  </button>

  <button class="nav-item" data-panel="view" title="">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1.5 9S4.5 3 9 3s7.5 6 7.5 6-3 6-7.5 6S1.5 9 1.5 9Z" stroke="currentColor" stroke-width="1.4" fill="none"/><circle cx="9" cy="9" r="2.5" fill="currentColor"/></svg>
    <span class="nav-tooltip">View</span>
  </button>

  <div class="nav-divider"></div>

  <button class="nav-item" data-panel="textures" title="">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M2 7h14M2 12h14M7 2v14M12 2v14" stroke="currentColor" stroke-width="1" opacity=".5"/></svg>
    <span class="nav-tooltip">Textures</span>
  </button>

  <button class="nav-item" data-panel="colors" title="">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.4"/><circle cx="6.5" cy="7" r="1.3" fill="currentColor"/><circle cx="11.5" cy="6" r="1.3" fill="currentColor"/><circle cx="12.5" cy="11" r="1.3" fill="currentColor"/><circle cx="6" cy="12" r="1.3" fill="currentColor"/></svg>
    <span class="nav-tooltip">Colors</span>
  </button>

  <button class="nav-item" data-panel="elements" title="">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="5" width="14" height="10" rx="1" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M6 5V3M12 5V3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9 8.5v4M7 10.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity=".6"/></svg>
    <span class="nav-tooltip">Doors & Windows</span>
  </button>

  <div class="nav-divider"></div>

  <button class="nav-item" data-panel="lighting" title="">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="7.5" r="3.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M9 2v1M9 13v1M2 7.5h1M15 7.5h1M4.1 4.1l.7.7M13.2 13.2l.7.7M13.2 4.1l-.7.7M4.8 13.2l-.7.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M6.5 13h5l-.5 2h-4l-.5-2Z" fill="currentColor" opacity=".5"/></svg>
    <span class="nav-tooltip">Lighting</span>
  </button>

  <button class="nav-item" data-panel="upload" title="">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2v10M5.5 5 9 2l3.5 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13v2a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    <span class="nav-tooltip">Upload</span>
  </button>

  <button class="nav-item" data-panel="ar" title="" id="nav-ar">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="4" width="16" height="11" rx="2" stroke="currentColor" stroke-width="1.4" fill="none"/><circle cx="9" cy="9.5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 4V2.5M13 4V2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="9" cy="9.5" r="0.8" fill="currentColor"/></svg>
    <span class="nav-tooltip">AR View</span>
  </button>
</div>

<!-- ─── Flyout panel ──────────────────────────────────────────────────────── -->
<div id="flyout">
  <div class="flyout-header">
    <span class="flyout-title" id="flyout-title">Samples</span>
    <button class="flyout-close" id="flyout-close">
      <svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 1l12 12M13 1 1 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="flyout-body" id="flyout-body"></div>
</div>

<!-- ─── Status bar ────────────────────────────────────────────────────────── -->
<div id="statusbar">Ready — click a sample to begin</div>

<canvas id="scene"></canvas>

<!-- ─── Tab content templates (hidden) ───────────────────────────────────── -->
<template id="tpl-samples">
  <div>
    <div class="label">Sample plans</div>
    <div class="btn-grid">
      <button class="btn" data-sample="1191">Architectural</button>
      <button class="btn" data-sample="4068">Compact</button>
      <button class="btn" data-sample="3676">Long house</button>
    </div>
  </div>
</template>

<template id="tpl-view">
  <div>
    <div class="label">Display</div>
    <button class="btn-full" id="toggle-view">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M1 7h12" stroke="currentColor" stroke-width="1.3"/></svg>
      Show original
    </button>
  </div>
  <div>
    <div class="label">Camera</div>
    <div class="btn-grid">
      <button class="btn" id="cam-reset">↺ Reset</button>
      <button class="btn" id="cam-top">⊙ Top</button>
    </div>
  </div>
  <div>
    <div class="label">Render</div>
    <div class="toggle-row">
      <span class="toggle-label">Shadows</span>
      <label class="toggle">
        <input type="checkbox" id="tog-shadows" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Ambient occlusion</span>
      <label class="toggle">
        <input type="checkbox" id="tog-ao" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Fog effect</span>
      <label class="toggle">
        <input type="checkbox" id="tog-fog">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>
</template>

<template id="tpl-textures">
  <div>
    <div class="label">Wall texture</div>
    <div class="texture-grid" id="tex-wall-grid"></div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

/* ── Constants ─────────────────────────────────────────────────────────── */
const TARGET_PLAN_SIZE = 15.0;
const WALL_HEIGHT      = 2.8;
const DOOR_HEIGHT      = 2.1;
const WINDOW_SILL      = 0.9;

const DEFAULTS = { wall:"#ffffff", door:"#e8d5b7", window:"#c8dce6", floor:"#e8e4dc" };
const hexToInt = h => parseInt(h.replace("#",""), 16);

/* ── Procedural texture generator ─────────────────────────────────────── */
function makeProceduralTexture(fn, size=256) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  fn(ctx, size);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const WALL_TEXTURES = {
  smooth: {
    label: 'Smooth',
    gen: (ctx, s) => {
      ctx.fillStyle = '#f5f3f0'; ctx.fillRect(0,0,s,s);
      for(let i=0;i<200;i++){
        const x=Math.random()*s, y=Math.random()*s, r=Math.random()*2+0.5;
        ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.015})`;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }
    },
    roughness: 0.85, metalness: 0
  },
  plaster: {
    label: 'Plaster',
    gen: (ctx, s) => {
      ctx.fillStyle = '#ede8e0'; ctx.fillRect(0,0,s,s);
      for(let i=0;i<800;i++){
        const x=Math.random()*s, y=Math.random()*s;
        const d=Math.random()*3+1;
        ctx.fillStyle=`rgba(${Math.random()>0.5?'0,0,0':'255,255,255'},${Math.random()*0.03})`;
        ctx.fillRect(x,y,d,d);
      }
    },
    roughness: 0.9, metalness: 0
  },
  brick: {
    label: 'Brick',
    gen: (ctx, s) => {
      ctx.fillStyle = '#c47a4a'; ctx.fillRect(0,0,s,s);
      const bw=32, bh=16, mortar=2;
      for(let row=0;row<s/bh;row++){
        const offset=(row%2)*bw/2;
        for(let col=-1;col<s/bw+1;col++){
          const x=col*bw+offset, y=row*bh;
          const shade=Math.random()*30-15;
          ctx.fillStyle=`rgb(${196+shade},${122+shade/2},${74+shade/3})`;
          ctx.fillRect(x+mortar,y+mortar,bw-mortar*2,bh-mortar*2);
          // surface variation
          for(let i=0;i<3;i++){
            ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.05})`;
            ctx.fillRect(x+mortar+Math.random()*(bw-mortar*2), y+mortar+Math.random()*(bh-mortar*2), Math.random()*8, Math.random()*4);
          }
        }
      }
      ctx.fillStyle='rgba(200,180,160,0.7)';
      for(let row=0;row<=s/bh;row++){
        ctx.fillRect(0,row*bh,s,mortar);
      }
      for(let row=0;row<s/bh;row++){
        const offset=(row%2)*bw/2;
        for(let col=-1;col<s/bw+1;col++){
          ctx.fillRect(col*bw+offset,row*bh,mortar,bh);
        }
      }
    },
    roughness: 0.95, metalness: 0
  },
  concrete: {
    label: 'Concrete',
    gen: (ctx, s) => {
      ctx.fillStyle = '#b0aea8'; ctx.fillRect(0,0,s,s);
      for(let i=0;i<2000;i++){
        const x=Math.random()*s, y=Math.random()*s;
        ctx.fillStyle=`rgba(${Math.random()>0.5?'255,255,255':'0,0,0'},${Math.random()*0.04})`;
        ctx.fillRect(x,y,Math.random()*4,Math.random()*4);
      }
      // cracks
      for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.moveTo(Math.random()*s, Math.random()*s);
        for(let j=0;j<5;j++) ctx.lineTo(Math.random()*s, Math.random()*s);
        ctx.strokeStyle='rgba(80,78,75,0.15)'; ctx.lineWidth=0.5; ctx.stroke();
      }
    },
    roughness: 0.98, metalness: 0.02
  },
  wood: {
    label: 'Wood',
    gen: (ctx, s) => {
      ctx.fillStyle = '#a0724a'; ctx.fillRect(0,0,s,s);
      for(let y=0;y<s;y+=2){
        const w=2+Math.sin(y*0.3)*1.5;
        ctx.strokeStyle=`rgba(${Math.random()>0.5?'80,50,20':'180,130,80'},${0.1+Math.random()*0.15})`;
        ctx.lineWidth=w;
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(s,y+Math.sin(y*0.05)*3); ctx.stroke();
      }
    },
    roughness: 0.75, metalness: 0
  },
  marble: {
    label: 'Marble',
    gen: (ctx, s) => {
      ctx.fillStyle = '#e8e4e0'; ctx.fillRect(0,0,s,s);
      for(let i=0;i<40;i++){
        ctx.beginPath();
        let x=Math.random()*s, y=Math.random()*s;
        ctx.moveTo(x,y);
        for(let j=0;j<8;j++){
          x+=Math.random()*40-20; y+=Math.random()*40-20;

        ctx.strokeStyle=`rgba(${g},${g},${g},${Math.random()*0.12+0.04})`;

        ctx.stroke();

    roughness: 0.1, metalness: 0.05
  },
};

const FLOOR_TEXTURES = {
  parquet: {
    label: 'Parquet',
    gen: (ctx, s) => {

          ctx.fillStyle=`rgb(${168+shade},${120+shade/2},${68+shade/3})`;
          ctx.fillRect(col*tw,row*th,tw,th);
          for(let i=0;i<4;i++){
            ctx.fillStyle=`rgba(${Math.random()>0.5?'0,0,0':'255,255,255'},${Math.random()*0.06})`;
            ctx.fillRect(col*tw+Math.random()*tw,row*th+Math.random()*th,Math.random()*tw/2,1);
          }
          ctx.strokeStyle='rgba(100,70,40,0.25)'; ctx.lineWidth=1;
          ctx.strokeRect(col*tw+0.5,row*th+0.5,tw-1,th-1);

    },
    roughness: 0.6, metalness: 0
  },
  tile: {
    label: 'Tile',
    gen: (ctx, s) => {

        for(let col=0;col<s/tw;col++){
          const shade=Math.random()*12-6;
          ctx.fillStyle=`rgb(${220+shade},${216+shade},${210+shade})`;
          ctx.fillRect(col*tw+2,row*tw+2,tw-4,tw-4);
        }
      }
      ctx.strokeStyle='rgba(160,155,148,0.8)'; ctx.lineWidth=3;
      for(let i=0;i<=s/tw;i++){ctx.beginPath();ctx.moveTo(i*tw,0);ctx.lineTo(i*tw,s);ctx.stroke();}
      for(let i=0;i<=s/tw;i++){ctx.beginPath();ctx.moveTo(0,i*tw);ctx.lineTo(s,i*tw);ctx.stroke();}
    },
    roughness: 0.3, metalness: 0.05
  },
  concrete: {
    label: 'Concrete',
    gen: WALL_TEXTURES.concrete.gen,
    roughness: 0.95, metalness: 0
  },
  carpet: {
    label: 'Carpet',
    gen: (ctx, s) => {
      ctx.fillStyle = '#6a8a9a'; ctx.fillRect(0,0,s,s);
      for(let i=0;i<3000;i++){
        const x=Math.random()*s, y=Math.random()*s;
        ctx.fillStyle=`rgba(${Math.random()>0.5?'255,255,255':'0,0,0'},${Math.random()*0.06})`;
        ctx.fillRect(x,y,1,Math.random()*3+1);
      }
    },
    roughness: 1.0, metalness: 0
  },
  herringbone: {
    label: 'Herring',
    gen: (ctx, s) => {
      ctx.fillStyle='#8a6340'; ctx.fillRect(0,0,s,s);
      const tw=20, th=10;
      for(let row=-2;row<s/th+2;row++){
        for(let col=-2;col<s/tw+2;col++){
          const x=col*tw+(row%2)*tw/2;
          const y=row*th;
          const shade=Math.random()*25-12;
          ctx.fillStyle=`rgb(${138+shade},${99+shade/2},${64+shade/3})`;
          ctx.save();
          ctx.translate(x+tw/2, y+th/2);
          ctx.rotate((row%2===0?45:-45)*Math.PI/180);
          ctx.fillRect(-tw/2,-th/2,tw,th);
          ctx.restore();
        }
      }
    },
    roughness: 0.65, metalness: 0
  },
  marble: {
    label: 'Marble',
    gen: WALL_TEXTURES.marble.gen,
    roughness: 0.08, metalness: 0.08
  },
};

/* ── Three.js setup ───────────────────────────────────────────────────── */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1117);

const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 200);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3.5;
controls.maxDistance = 40;
controls.maxPolarAngle = Math.PI / 2 - 0.04;

/* ── Lights ───────────────────────────────────────────────────────────── */
const hemi = new THREE.HemisphereLight(0xddeeff, 0xc8b89a, 0.6);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xfff5e0, 2.2);
sun.position.set(6, 12, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -8; sun.shadow.camera.right = 8;
sun.shadow.camera.top  =  8; sun.shadow.camera.bottom = -8;
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 40;
sun.shadow.bias = -0.0005;

const ambLight = new THREE.AmbientLight(0xffffff, 0.22);
scene.add(ambLight);

// Subtle fill light for architectural feel
const fillLight = new THREE.DirectionalLight(0x8ab4f8, 0.35);
fillLight.position.set(-4, 6, -3);
scene.add(fillLight);

// Subtle ground bounce
const bounceLight = new THREE.PointLight(0xffe8c0, 0.4, 20);
bounceLight.position.set(0, -0.5, 0);
scene.add(bounceLight);

/* ── Fog ──────────────────────────────────────────────────────────────── */
// fog is off by default, toggled by UI

/* ── Floor ────────────────────────────────────────────────────────────── */
const floorGeom = new THREE.PlaneGeometry(60, 60);
floorGeom.rotateX(-Math.PI / 2);
const floorMat = new THREE.MeshStandardMaterial({ color: hexToInt(DEFAULTS.floor), roughness: 0.92, metalness: 0.01 });
const floorMesh = new THREE.Mesh(floorGeom, floorMat);
floorMesh.receiveShadow = true;
scene.add(floorMesh);

// Subtle grid on the floor
const gridHelper = new THREE.GridHelper(30, 30, 0x333344, 0x222230);
gridHelper.position.y = 0.001;
gridHelper.material.opacity = 0.25;
gridHelper.material.transparent = true;

/* ── Shared materials ─────────────────────────────────────────────────── */
const wallMat   = new THREE.MeshStandardMaterial({ color: hexToInt(DEFAULTS.wall),   roughness: 0.85, metalness: 0 });
const doorMat   = new THREE.MeshStandardMaterial({ color: hexToInt(DEFAULTS.door),   roughness: 0.75, metalness: 0 });
const windowMat = new THREE.MeshPhysicalMaterial({
  color: hexToInt(DEFAULTS.window),
  transparent: true, opacity: 0.45,
  roughness: 0.04, metalness: 0.1,
  transmission: 0.5, ior: 1.5,
  reflectivity: 0.8,
});
const edgeMat = new THREE.LineBasicMaterial({ color: 0x888899, transparent: true, opacity: 0.5 });

/* ── Plan group ───────────────────────────────────────────────────────── */
const planGroup = new THREE.Group();
scene.add(planGroup);

let currentFraming = null;
let showingOriginal = false;

/* ── Resize ───────────────────────────────────────────────────────────── */
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, true);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

/* ── Camera helpers ───────────────────────────────────────────────────── */
function frameModel(center, radius) {
  const fovY = THREE.MathUtils.degToRad(camera.fov);
  const fovX = 2 * Math.atan(Math.tan(fovY/2) * camera.aspect);
  const dist = radius / Math.sin(Math.min(fovY, fovX)/2) * 1.15;
  const dir  = new THREE.Vector3(0.55, 0.62, 0.85).normalize();
  camera.position.copy(center).addScaledVector(dir, dist);
  controls.target.copy(center);
  controls.update();
}

const cameraTween = { active: false };
function tweenCamera(toPos, toTarget, duration=600) {
  cameraTween.fromPos    = camera.position.clone();
  cameraTween.toPos      = toPos.clone();
  cameraTween.fromTarget = controls.target.clone();
  cameraTween.toTarget   = toTarget.clone();
  cameraTween.t0         = performance.now();
  cameraTween.duration   = duration;
  cameraTween.active     = true;
}
function overheadPosition(center, radius) {
  const fovY = THREE.MathUtils.degToRad(camera.fov);
  const fovX = 2 * Math.atan(Math.tan(fovY/2) * camera.aspect);
  const dist = radius / Math.sin(Math.min(fovY,fovX)/2) * 1.15;
  return new THREE.Vector3(center.x, center.y+dist, center.z+0.001);
}

/* ── Geometry builders ────────────────────────────────────────────────── */
function buildShape(outer, holes, scale, cx, cy) {
  const shape = new THREE.Shape();
  outer.forEach(([x,y],i) => {
    const sx=(x-cx)*scale, sy=(y-cy)*scale;
    i===0 ? shape.moveTo(sx,sy) : shape.lineTo(sx,sy);
  });
  shape.closePath();
  for(const hole of holes??[]) {
    const path = new THREE.Path();
    hole.forEach(([x,y],i) => {
      const sx=(x-cx)*scale, sy=(y-cy)*scale;
      i===0 ? path.moveTo(sx,sy) : path.lineTo(sx,sy);
    });
    path.closePath();
    shape.holes.push(path);
  }
  return shape;
}

/* ── Door types ───────────────────────────────────────────────────────── */
const DOOR_TYPES = {
  standard: {
    label: 'Standard', icon: `<svg width="36" height="40" viewBox="0 0 36 40" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="2" width="28" height="36" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M28 8v24" stroke="currentColor" stroke-width="1" opacity=".4"/><circle cx="8" cy="20" r="2" fill="currentColor" opacity=".6"/></svg>`,
    build: (shape, scale, depth, mat) => {
      const pts = shape.getPoints();
      let edges = [];
      for(let i=0; i<pts.length; i++) edges.push({ a: pts[i], b: pts[(i+1)%pts.length], len: pts[i].distanceTo(pts[(i+1)%pts.length]) });
      edges.sort((a,b) => b.len - a.len);
      let hinge = edges[0].a, dirVec;
      const isPie = (edges[0].a.equals(edges[1].b) || edges[0].b.equals(edges[1].a) || edges[0].a.equals(edges[1].a) || edges[0].b.equals(edges[1].b));
      if (isPie) {
        if (edges[0].a.equals(edges[1].b)) hinge = edges[0].a;
        else if (edges[0].b.equals(edges[1].a)) hinge = edges[0].b;
        else if (edges[0].a.equals(edges[1].a)) hinge = edges[0].a;
        else hinge = edges[0].b;
        const v1 = (hinge.equals(edges[0].a) ? edges[0].b : edges[0].a).clone().sub(hinge).normalize();
        const v2 = (hinge.equals(edges[1].a) ? edges[1].b : edges[1].a).clone().sub(hinge).normalize();
        dirVec = v1.add(v2).normalize();
      } else {
        const v1 = edges[0].b.clone().sub(edges[0].a);
        dirVec = v1.clone().normalize().rotateAround(new THREE.Vector2(0,0), Math.PI/4);
      }
      const doorLen = isPie ? (edges[0].len + edges[1].len)/2 : edges[0].len;
      const perp = new THREE.Vector2(-dirVec.y, dirVec.x).multiplyScalar(0.03);
      const pShape = new THREE.Shape();
      const p1=hinge.clone().sub(perp), p2=hinge.clone().add(perp);
      pShape.moveTo(p1.x, p1.y); pShape.lineTo(p2.x, p2.y);
      pShape.lineTo(p2.x+dirVec.x*doorLen, p2.y+dirVec.y*doorLen);
      pShape.lineTo(p1.x+dirVec.x*doorLen, p1.y+dirVec.y*doorLen);
      pShape.closePath();
      const geom = new THREE.ExtrudeGeometry(pShape, { depth, bevelEnabled: true, bevelSize: 0.01, bevelThickness: 0.001, bevelSegments: 1 });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.castShadow = true; mesh.receiveShadow = true; mesh.rotation.x = -Math.PI/2;
      const edgesGeom = new THREE.EdgesGeometry(geom, EDGE_ANGLE_DEG);
      mesh.add(new THREE.LineSegments(edgesGeom, edgeMat));
      return mesh;
    }
  },

  double: {
    label: 'Double', icon: `<svg width="36" height="40" viewBox="0 0 36 40" fill="none"><rect x="2" y="2" width="14" height="36" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="20" y="2" width="14" height="36" rx="1" stroke="currentColor" stroke-width="1.5"/><circle cx="14.5" cy="20" r="1.5" fill="currentColor" opacity=".6"/><circle cx="21.5" cy="20" r="1.5" fill="currentColor" opacity=".6"/></svg>`,
    build: (shape, scale, depth, mat) => {
      const pts = shape.getPoints();
      let edges = [];
      for(let i=0; i<pts.length; i++) edges.push({ a: pts[i], b: pts[(i+1)%pts.length], len: pts[i].distanceTo(pts[(i+1)%pts.length]) });
      edges.sort((a,b) => b.len - a.len);
      const v1 = edges[0].b.clone().sub(edges[0].a);
      const doorLen = edges[0].len / 2;
      const buildPanel = (hinge, dirVec) => {
        const perp = new THREE.Vector2(-dirVec.y, dirVec.x).multiplyScalar(0.03);
        const pShape = new THREE.Shape();
        const p1=hinge.clone().sub(perp), p2=hinge.clone().add(perp);
        pShape.moveTo(p1.x, p1.y); pShape.lineTo(p2.x, p2.y);
        pShape.lineTo(p2.x+dirVec.x*doorLen, p2.y+dirVec.y*doorLen);
        pShape.lineTo(p1.x+dirVec.x*doorLen, p1.y+dirVec.y*doorLen);
        pShape.closePath();
        return pShape;
      };
      const dir1 = v1.clone().normalize().rotateAround(new THREE.Vector2(0,0), Math.PI/4);
      const dir2 = v1.clone().multiplyScalar(-1).normalize().rotateAround(new THREE.Vector2(0,0), -Math.PI/4);
      const pShape1 = buildPanel(edges[0].a, dir1);
      const pShape2 = buildPanel(edges[0].b, dir2);
      const geom1 = new THREE.ExtrudeGeometry(pShape1, { depth, bevelEnabled: true, bevelSize: 0.01, bevelThickness: 0.001, bevelSegments: 1 });
      const geom2 = new THREE.ExtrudeGeometry(pShape2, { depth, bevelEnabled: true, bevelSize: 0.01, bevelThickness: 0.001, bevelSegments: 1 });
      const mesh = new THREE.Mesh(geom1, mat);
      const mesh2 = new THREE.Mesh(geom2, mat);
      mesh.add(mesh2);
      mesh.castShadow = true; mesh.receiveShadow = true; mesh.rotation.x = -Math.PI/2;
      mesh2.castShadow = true; mesh2.receiveShadow = true;
      mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geom1, EDGE_ANGLE_DEG), edgeMat));
      mesh2.add(new THREE.LineSegments(new THREE.EdgesGeometry(geom2, EDGE_ANGLE_DEG), edgeMat));
      return mesh;
    }
  },
};

/* ── Animations ───────────────────────────────────────────────────────── */
const animations = [];

function tick(now) {
  for(const a of animations) {
    const t     = Math.min(1, Math.max(0, (now-a.start-a.delay)/a.duration));
    const eased = 1 - Math.pow(1-t, 3);
    if (a.mesh.isGroup) {
      a.mesh.scale.y = Math.max(0.001, eased);
    } else {
      a.mesh.scale.z = Math.max(0.001, eased);
    }
  }
  if(cameraTween.active) {
    const t = Math.min(1, (now-cameraTween.t0)/cameraTween.duration);
    const e = 1 - Math.pow(1-t, 3);
    camera.position.lerpVectors(cameraTween.fromPos, cameraTween.toPos, e);
    controls.target.lerpVectors(cameraTween.fromTarget, cameraTween.toTarget, e);
    if(t>=1) cameraTween.active = false;
  }
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ── Plan lifecycle ───────────────────────────────────────────────────── */
function disposeMeshDeep(obj) {
  if(obj.geometry) obj.geometry.dispose();
  if(obj.userData?.disposable?.texture) obj.userData.disposable.texture.dispose();
  for(const c of obj.children) disposeMeshDeep(c);
}
function clearPlan() {
  while(planGroup.children.length>0) {
    const c = planGroup.children[0];
    planGroup.remove(c);
    disposeMeshDeep(c);
  }
  animations.length = 0;
}

function polygonsBBox(polygons) {
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const cls of ['wall','door','window']) {
    for(const p of polygons[cls]??[]) {
      for(const [x,y] of p.outer) {
        if(x<minX)minX=x; if(y<minY)minY=y;
        if(x>maxX)maxX=x; if(y>maxY)maxY=y;
      }
    }
  }
  return {minX,minY,maxX,maxY};
}
function polygonCentroidImage(poly) {
  let sx=0,sy=0;
  for(const [x,y] of poly.outer){sx+=x;sy+=y;}
  const n=poly.outer.length;
  return [sx/n,sy/n];
}

let lastPlanData = null;

window.loadPlan = loadPlan;
async function loadPlan(data) {
  lastPlanData = data;
  clearPlan();

  const bbox = polygonsBBox(data.polygons);
  const bw=bbox.maxX-bbox.minX, bh=bbox.maxY-bbox.minY;
  if(!isFinite(bw)||bw<=0||bh<=0){ setStatus('No polygons in this plan.'); return; }
  const cx=(bbox.minX+bbox.maxX)/2, cy=(bbox.minY+bbox.maxY)/2;
  const scale=TARGET_PLAN_SIZE/Math.max(bw,bh);
  currentFraming = { center: new THREE.Vector3(0,WALL_HEIGHT/2,0), radius: Math.hypot(bw*scale/2,bh*scale/2,WALL_HEIGHT) };
  if(showingOriginal) setShowOriginal(false,false);
  frameModel(currentFraming.center, currentFraming.radius);

  if(data.input_image_b64) {
    try {
      const img = new Image();
      await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src='data:image/png;base64,'+data.input_image_b64;});
      const tex = new THREE.Texture(img);
      tex.colorSpace=THREE.SRGBColorSpace; tex.minFilter=THREE.LinearFilter; tex.flipY=false; tex.needsUpdate=true;
      const [left,top,innerW,innerH]=data.content_rect;
      const planeGeom=new THREE.PlaneGeometry(innerW*scale,innerH*scale);
      planeGeom.rotateX(-Math.PI/2);
      const plane=new THREE.Mesh(planeGeom,new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false}));
      plane.position.set((left+innerW/2-cx)*scale,0.002,-(top+innerH/2-cy)*scale);
      plane.userData={disposable:{texture:tex},isInputImage:true};
      planGroup.add(plane);
    } catch(e){console.warn('input image:',e);}
  }

  const items=[];
  for(const p of data.polygons.wall??[])   items.push({poly:p,kind:'wall'});
  for(const p of data.polygons.door??[])   items.push({poly:p,kind:'door'});
  for(const p of data.polygons.window??[]) items.push({poly:p,kind:'window'});
  items.sort((a,b)=>{
    const [ax,ay]=polygonCentroidImage(a.poly);
    const [bx,by]=polygonCentroidImage(b.poly);
    return Math.hypot(ax-cx,ay-cy)-Math.hypot(bx-cx,by-cy);
  });

  const start=performance.now();
  items.forEach((item,i)=>{
    const shape=buildShape(item.poly.outer,item.poly.holes,scale,cx,cy);
    let obj;
    if(item.kind==='wall') {
      const geom=new THREE.ExtrudeGeometry(shape,{depth:WALL_HEIGHT,bevelEnabled:true,bevelSize:0.04,bevelThickness:0.001,bevelSegments:1,curveSegments:4});
      const mesh=new THREE.Mesh(geom,wallMat);
      mesh.castShadow=true; mesh.receiveShadow=true; mesh.rotation.x=-Math.PI/2;
      const edges=new THREE.EdgesGeometry(geom,EDGE_ANGLE_DEG);
      mesh.add(new THREE.LineSegments(edges,edgeMat));
      obj=mesh;
      obj.scale.z=0.001;
    } else if(item.kind==='door') {
      const dt=DOOR_TYPES[currentDoorType]??DOOR_TYPES.standard;
      const mesh=dt.build(shape,scale,DOOR_HEIGHT,doorMat);
      const group=new THREE.Group();
      group.add(mesh);
      if(WALL_HEIGHT>DOOR_HEIGHT) {
        const wallAboveGeom=new THREE.ExtrudeGeometry(shape,{depth:WALL_HEIGHT-DOOR_HEIGHT,bevelEnabled:true,bevelSize:0.04,bevelThickness:0.001,bevelSegments:1,curveSegments:4});
        const wallAbove=new THREE.Mesh(wallAboveGeom,wallMat);
        wallAbove.castShadow=true; wallAbove.receiveShadow=true;
        wallAbove.rotation.x=-Math.PI/2;
        wallAbove.position.y=DOOR_HEIGHT;
        group.add(wallAbove);
      }
      obj=group;
      obj.scale.y=0.001;
    } else {
      const wt=WINDOW_TYPES[currentWindowType]??WINDOW_TYPES.standard;
      const depth=WINDOW_TOP-WINDOW_SILL;
      const mesh=wt.build(shape,scale,depth,windowMat);
      mesh.position.y=WINDOW_SILL;
      const group=new THREE.Group();
      group.add(mesh);
      if(WINDOW_SILL>0) {
        const wallBelowGeom=new THREE.ExtrudeGeometry(shape,{depth:WINDOW_SILL,bevelEnabled:true,bevelSize:0.04,bevelThickness:0.001,bevelSegments:1,curveSegments:4});
        const wallBelow=new THREE.Mesh(wallBelowGeom,wallMat);
        wallBelow.castShadow=true; wallBelow.receiveShadow=true;
        wallBelow.rotation.x=-Math.PI/2;
        group.add(wallBelow);
      }
      if(WALL_HEIGHT>WINDOW_TOP) {
        const wallAboveGeom=new THREE.ExtrudeGeometry(shape,{depth:WALL_HEIGHT-WINDOW_TOP,bevelEnabled:true,bevelSize:0.04,bevelThickness:0.001,bevelSegments:1,curveSegments:4});
        const wallAbove=new THREE.Mesh(wallAboveGeom,wallMat);
        wallAbove.castShadow=true; wallAbove.receiveShadow=true;
        wallAbove.rotation.x=-Math.PI/2;
        wallAbove.position.y=WINDOW_TOP;
        group.add(wallAbove);
      }
      obj=group;
      obj.scale.y=0.001;
    }
    planGroup.add(obj);
    animations.push({mesh:obj,start,delay:i*STAGGER_MS,duration:RISE_DURATION_MS});
  });
}

/* ── API helpers ──────────────────────────────────────────────────────── */
const statusEl = document.getElementById('statusbar');
let inFlight = false;

function setStatus(msg) { statusEl.textContent = msg; }
function summarize(data) {
  const w=data.polygons.wall.length, d=data.polygons.door.length, win=data.polygons.window.length;
  return `${w} walls · ${d} doors · ${win} windows`;
}

async function fetchAndLoad(url, init) {
  if(inFlight) return;
  inFlight=true; setStatus('Loading…');
  try {
    const res=await fetch(url,init);
    if(!res.ok){const t=await res.text();setStatus(`Error ${res.status}: ${t.slice(0,120)}`);return;}
    const data=await res.json();
    setStatus(summarize(data));
    await loadPlan(data);
  } catch(e){setStatus('Failed: '+e.message);}
  finally{inFlight=false;}
}

/* ── Color helpers ────────────────────────────────────────────────────── */
function applyColor(key, hex) {
  const int=hexToInt(hex);
  if(key==='floor'){
    floorMat.color.set(int);
    if(currentFloorTex) { floorMat.map=null; floorMat.needsUpdate=true; currentFloorTex=null; }
  } else if(key==='wall'){
    wallMat.color.set(int);
    if(currentWallTex) { wallMat.map=null; wallMat.needsUpdate=true; currentWallTex=null; }
  } else if(key==='door') doorMat.color.set(int);
  else if(key==='window') windowMat.color.set(int);
  const sw=document.getElementById('swatch-'+key);
  const hx=document.getElementById('hex-'+key);
  const ci=document.getElementById('color-'+key);
  if(sw) sw.style.background=hex;
  if(hx) hx.textContent=hex;
  if(ci) ci.value=hex;
}

  const sunPositions={
    'sun-morning': ()=>{ sun.position.set(12,4,0); sun.color.set(0xff9933); sun.intensity=1.2; },
    'sun-noon':    ()=>{ sun.position.set(0,15,0);  sun.color.set(0xfff8f0); sun.intensity=2.8; },
    'sun-evening': ()=>{ sun.position.set(-12,3,4); sun.color.set(0xff6622); sun.intensity=1.0; },
    'sun-night':   ()=>{ sun.position.set(0,10,0);  sun.color.set(0x3355aa); sun.intensity=0.3; hemi.intensity=0.1; },
  };
  for(const [id,fn] of Object.entries(sunPositions)){
    document.getElementById(id)?.addEventListener('click',fn);
  }

  document.getElementById('tog-bloom')?.addEventListener('change',e=>{
    renderer.toneMappingExposure = e.target.checked ? 1.6 : 1.1;
  });
  document.getElementById('tog-reflect')?.addEventListener('change',e=>{
    floorMat.roughness = e.target.checked ? 0.25 : 0.92;
    floorMat.metalness = e.target.checked ? 0.2 : 0.01;
    floorMat.needsUpdate=true;
  });
}

function initAr() {
  const startBtn = document.getElementById('ar-start-btn');
  if (!startBtn) return;
  startBtn.addEventListener('click', startAr);

  // wire sliders if already in AR mode
  ['ar-scale','ar-rotate','ar-height','ar-opacity'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', applyArTransform);
  });
}

let arStream = null;
let arOrientHandler = null;
let arBaseAlpha = null;

function applyArTransform() {
  const scale   = parseFloat(document.getElementById('ar-scale')?.value   ?? 1);
  const rotDeg  = parseFloat(document.getElementById('ar-rotate')?.value  ?? 0);
  const heightV = parseFloat(document.getElementById('ar-height')?.value  ?? 0);
  const opacity = parseFloat(document.getElementById('ar-opacity')?.value ?? 0.85);
  planGroup.scale.set(scale, scale, scale);
  planGroup.rotation.y = THREE.MathUtils.degToRad(rotDeg);
  planGroup.position.y = heightV;
  planGroup.traverse(c => { if (c.isMesh && c.material) { c.material.transparent = true; c.material.opacity = opacity; c.material.needsUpdate = true; } });
}

function startAr() {
  if (!navigator.mediaDevices?.getUserMedia) {
    setStatus('Camera API not supported in this browser.');
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } })
  .then(stream => {
    arStream = stream;
    // Create video element if missing
    let vid = document.getElementById('ar-video');
    if (!vid) {
      vid = document.createElement('video');
      vid.id = 'ar-video';
      vid.autoplay = true;
      vid.playsInline = true;
      vid.muted = true;
      document.body.insertBefore(vid, document.body.firstChild);
    }
    vid.srcObject = stream;
    vid.classList.add('active');

    // Make Three.js canvas transparent so video shows through
    const canvas = document.getElementById('scene');
    canvas.classList.add('ar-mode');
    renderer.setClearColor(0x000000, 0);
    renderer.setClearAlpha(0);
    scene.background = null;

    // Show HUD
    let hud = document.getElementById('ar-hud');
    if (!hud) {
      hud = document.createElement('div');
      hud.id = 'ar-hud';
      hud.innerHTML = `
        <span class="ar-badge">AR LIVE</span>
        <label>Scale<input type="range" id="ar-scale-hud" min="0.3" max="3" step="0.01" value="1"></label>
        <label>Rotate<input type="range" id="ar-rotate-hud" min="-180" max="180" step="1" value="0"></label>
        <label>Height<input type="range" id="ar-height-hud" min="-5" max="5" step="0.05" value="0"></label>
        <button id="ar-stop-btn">✕ Stop AR</button>
      `;
      document.body.appendChild(hud);
    }
    hud.classList.add('active');
    document.getElementById('ar-stop-btn').addEventListener('click', stopAr);
    ['ar-scale-hud','ar-rotate-hud','ar-height-hud'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', e => {
        // sync with panel sliders
        const base = id.replace('-hud','').replace('ar-scale-hud','ar-scale').replace('ar-rotate-hud','ar-rotate').replace('ar-height-hud','ar-height');
        const panelSlider = document.getElementById(base) ?? document.getElementById(id.replace('-hud',''));
        if (panelSlider) panelSlider.value = e.target.value;
        applyArTransform();
      });
    });

    // Device orientation for real-world camera rotation
    arBaseAlpha = null;
    arOrientHandler = (e) => {
      if (arBaseAlpha === null && e.alpha !== null) arBaseAlpha = e.alpha;
      if (e.alpha === null) return;
      const yaw   = THREE.MathUtils.degToRad(-(e.alpha - arBaseAlpha));
      const pitch = THREE.MathUtils.degToRad(e.beta  - 90);
      const roll  = THREE.MathUtils.degToRad(-e.gamma);
      camera.rotation.set(pitch, yaw, roll, 'YXZ');
      controls.enabled = false;
    };
    if (window.DeviceOrientationEvent?.requestPermission) {
      window.DeviceOrientationEvent.requestPermission().then(p => {
        if (p === 'granted') window.addEventListener('deviceorientation', arOrientHandler);
      });
    } else {
      window.addEventListener('deviceorientation', arOrientHandler);
    }
    setStatus('AR active — align model with your floorplan');
  })
  .catch(err => setStatus('Camera access denied: ' + err.message));
}

function stopAr() {
  if (arStream) { arStream.getTracks().forEach(t => t.stop()); arStream = null; }
  if (arOrientHandler) { window.removeEventListener('deviceorientation', arOrientHandler); arOrientHandler = null; }
  arBaseAlpha = null;
  controls.enabled = true;
  document.getElementById('ar-video')?.classList.remove('active');
  document.getElementById('ar-hud')?.classList.remove('active');
  document.getElementById('scene')?.classList.remove('ar-mode');
  renderer.setClearColor(0x0f1117, 1);
  renderer.setClearAlpha(1);
  scene.background = new THREE.Color(0x0f1117);
  // restore material opacity
  planGroup.traverse(c => { if (c.isMesh && c.material && c.userData._origOpacity != null) {
    c.material.opacity = c.userData._origOpacity; c.material.needsUpdate = true;
  }});
  setStatus('AR stopped');
}
function initUpload() {
  const btn=document.getElementById('upload-btn');
  if(!btn) return;
  btn.addEventListener('click',()=>document.getElementById('file-input')?.click());
  document.getElementById('file-input')?.addEventListener('change',e=>{
    if(!e.target.files.length) return;
    const file = e.target.files[0];
    if (file.name.toLowerCase().endsWith('.json')) {
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          setStatus('Loaded local plan');
          loadPlan(data);
        } catch(err) {
          setStatus('Failed to parse JSON');
        }
      };
      reader.readAsText(file);
    } else {
      const fd=new FormData(); fd.append('svg',file);
      fetchAndLoad(API_BASE_URL + '/extract',{method:'POST',body:fd});
    }
    e.target.value='';
  });

  // optional check for healthz just to verify backend
  fetch(API_BASE_URL + '/healthz',{cache:'no-store'}).catch(()=>{});
}

/* ── View toggle ──────────────────────────────────────────────────────── */
function setShowOriginal(on, animate=true) {
  showingOriginal=on;
  for(const child of planGroup.children) {
    if(!child.userData?.isInputImage) child.visible=!on;
  }
  controls.enableRotate=!on;
  if(!currentFraming) return;
  const {center,radius}=currentFraming;
  if(animate) {
    tweenCamera(on ? overheadPosition(center,radius) : (() => {
      const fovY=THREE.MathUtils.degToRad(camera.fov);
      const fovX=2*Math.atan(Math.tan(fovY/2)*camera.aspect);
      const dist=radius/Math.sin(Math.min(fovY,fovX)/2)*1.15;
      return center.clone().addScaledVector(new THREE.Vector3(0.55,0.62,0.85).normalize(),dist);
    })(), center);
  }
}

/* ── Boot ─────────────────────────────────────────────────────────────── */
const urlParams=new URLSearchParams(window.location.search);
if(!urlParams.has('no_demo')) fetchAndLoad('./demos/1191.json');

// expose helpers for panel init code
window._scene = { applyColor, setShowOriginal };

/* ── Panel routing ─────────────────────────────────────────────────────── */
const flyout    = document.getElementById('flyout');
const flyoutTitle = document.getElementById('flyout-title');
const flyoutBody  = document.getElementById('flyout-body');
const flyoutClose = document.getElementById('flyout-close');
const navItems  = document.querySelectorAll('.nav-item');

const panelMeta = {
  samples:  { title: 'Samples',        tpl: 'tpl-samples'  },
  view:     { title: 'View',           tpl: 'tpl-view'     },
  textures: { title: 'Textures',       tpl: 'tpl-textures' },
  colors:   { title: 'Colors',         tpl: 'tpl-colors'   },
  elements: { title: 'Doors & Windows',tpl: 'tpl-elements' },
  lighting: { title: 'Lighting',       tpl: 'tpl-lighting' },
  upload:   { title: 'Upload',         tpl: 'tpl-upload'   },
  ar:       { title: 'AR Camera',      tpl: 'tpl-ar'       },
};

let activePanel = null;

function openPanel(name) {
  if (activePanel === name) { closePanel(); return; }
  activePanel = name;
  const meta = panelMeta[name];
  flyoutTitle.textContent = meta.title;
  flyoutBody.innerHTML = '';
  const clone = document.getElementById(meta.tpl).content.cloneNode(true);
  flyoutBody.appendChild(clone);
  flyout.classList.add('open');
  navItems.forEach(n => n.classList.toggle('active', n.dataset.panel === name));
  // init panel-specific UI
  initPanel(name);
}

function closePanel() {
  activePanel = null;
  flyout.classList.remove('open');
  navItems.forEach(n => n.classList.remove('active'));
}

flyoutClose.addEventListener('click', closePanel);
navItems.forEach(n => n.addEventListener('click', () => openPanel(n.dataset.panel)));

// Open samples by default
setTimeout(() => openPanel('samples'), 100);
</script>
